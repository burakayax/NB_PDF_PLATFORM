# Render.com deploy konfigürasyonu
# Dökümantasyon: https://render.com/docs/blueprint-spec

services:
  # ─── PDF API (FastAPI / Python) ───────────────────────────────────────────
  - type: web
    name: nb-pdf-api
    branch: main              # SADECE main'e push'ta deploy et (calismaAlani'yi yok say)
    # Docker runtime: native Python runtime'da apt-get çalışmaz (salt-okunur FS).
    # Sistem araçları (tesseract/poppler/wkhtmltopdf/ghostscript) Dockerfile'da kurulur.
    runtime: docker
    region: frankfurt         # EU kullanıcılarına yakın; değiştirilebilir
    plan: starter             # Starter (512MB): UYUMAZ → cold-start yok ("PDF kontrol
                              # ediliyor" takılması free plan cold-start'ından kaynaklanıyordu).
                              # Not: AI-OCR (docling/easyocr) ağır işler için ~2GB → 'standard'
                              # gerekir. Temel PDF araçları Starter'da çalışır; büyük dosya/OCR'da
                              # OOM olursa 'standard'a yükseltin.
    dockerfilePath: web/backend/Dockerfile
    dockerContext: .          # proje kökü — imaj hem web/backend hem paylaşılan src/ içerir
    healthCheckPath: /api/health   # router prefix="/api" → health endpoint /api/health
    envVars:
      - key: WEB_CONCURRENCY
        value: "1"            # free 512 MB RAM için tek gunicorn worker (OOM'u önler)
      - key: PDF_API_HOST
        value: "0.0.0.0"
      - key: PDF_CPU_WORKERS
        value: "2"
      - key: TRUSTED_HTTPS
        value: "true"
      - key: ENVIRONMENT
        value: "production"
      # Entitlement/kota kontrolü için Auth API kökü (servisler arası çağrı)
      - key: NB_SAAS_API_BASE
        sync: false   # Örn. https://auth-api.pdfplatform.app
      # S3 lifecycle TTL (saat) — sonuç dosyaları 24 saat sonra otomatik silinir
      - key: S3_RESULT_TTL_HOURS
        value: "24"
      - key: S3_REGION
        sync: false   # Örn. eu-central-1 (AWS) veya auto (Cloudflare R2)
      # PDF Sandbox: her işlemi ayrı bir subprocess'te izole eder
      - key: PDF_SANDBOX_ENABLED
        value: "true"
      - key: PDF_SANDBOX_MEM_MB
        value: "384"    # free 512MB için düşük tutuldu (taşan işlem host'u OOM etmeden kesilir).
                        # Büyük plana geçince 1024'e çıkarılabilir.
      - key: PDF_SANDBOX_CPU_SEC
        value: "120"    # Her alt süreç için maksimum 120 saniye CPU
      - key: SENTRY_DSN
        sync: false   # Render dashboard'dan set edin
      - key: CORS_ORIGINS
        sync: false   # Render dashboard'dan set edin (örn. https://pdfplatform.app)
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false

  # ─── Auth API (Express / Node.js) ─────────────────────────────────────────
  - type: web
    name: nb-auth-api
    branch: main              # SADECE main'e push'ta deploy et (calismaAlani'yi yok say)
    runtime: node
    region: frankfurt
    plan: free                # ÜCRETSIZ (bakım/test dönemi). Gerçek yayında: starter
                              # Uyarı: free plan 15 dk işlem olmazsa uyur (~50 sn cold start)
    rootDir: web/api
    # PostgreSQL şeması (schema.postgres.prisma) ile generate + db push.
    # Not: migrations/ klasörü SQLite diyalektinde olduğu için Postgres'e
    # uygulanamaz; bunun yerine db push şemayı doğrudan Neon'a senkronlar.
    buildCommand: npm ci && npx prisma generate --schema prisma/schema.postgres.prisma && npm run build && npx prisma db push --schema prisma/schema.postgres.prisma --skip-generate --accept-data-loss && npm run prisma:seed
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: TRUSTED_HTTPS
        value: "true"
      # Render edge TLS sonlandırır; X-Forwarded-* başlıklarına güven
      - key: TRUST_PROXY
        value: "1"
      - key: FORCE_HTTPS
        value: "true"
      - key: DATABASE_URL
        sync: false   # PostgreSQL URL'si + havuz parametreleri:
                      # postgresql://user:pass@host/db?connection_limit=10&pool_timeout=30
                      # connection_limit: Render starter (paylaşımlı CPU) için 10 önerilir
                      # pool_timeout: uzun PDF sorgularında zaman aşımını önlemek için 30 sn
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: BILLING_ENCRYPTION_KEY
        sync: false
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_URI
        sync: false   # Test: https://sandbox-api.iyzipay.com | Gerçek: https://api.iyzipay.com
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ROLE_ADMIN_EMAIL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false   # Örn. https://pdfplatform.app
      - key: APP_BASE_URL
        sync: false   # Örn. https://api.pdfplatform.app
      - key: PAYMENT_CALLBACK_BASE_URL
        sync: false   # iyzico callback kökü; APP_BASE_URL ile aynı olmalı
      - key: OAUTH_FRONTEND_REDIRECT_ORIGIN
        sync: false   # Google OAuth sonrası yönlendirme; FRONTEND_ORIGIN ile aynı
      - key: GOOGLE_CLIENT_ID
        sync: false   # Google OAuth (boş bırakılırsa Google girişi devre dışı)
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false   # Upstash Redis önerilir (kötüye kullanım takibi + kalıcı sayaç)

  # ─── Frontend (Static Site) ────────────────────────────────────────────────
  # Not: Static site'lar global CDN'den servis edilir; `region` ve `plan`
  # alanları desteklenmez (her ikisi de blueprint doğrulama hatası verir).
  - type: web
    name: nb-pdf-frontend
    branch: main              # SADECE main'e push'ta deploy et (calismaAlani'yi yok say)
    runtime: static
    rootDir: web/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # SPA fallback: tüm yollar index.html'e döner (React Router için)
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    headers:
      # SAMEORIGIN (DENY değil): admin CMS önizlemesi siteyi aynı-köken iframe'de gömüyor.
      # Çapraz-köken clickjacking yine CSP frame-ancestors 'self' ile engelli.
      - path: "/*"
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: "/*"
        name: X-Content-Type-Options
        value: nosniff
      - path: "/*"
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: "/*"
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), interest-cohort=()"
      - path: "/*"
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains; preload"
      - path: "/*"
        name: Cross-Origin-Opener-Policy
        value: same-origin
      # XSS azaltımı. connect-src API origin'lerini içermeli — kendi VITE_SAAS_API_BASE /
      # VITE_API_BASE değerlerinizle eşleştiğini doğrulayın (wildcard'lar onrender + pdfplatform.app'i kapsar).
      - path: "/*"
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; worker-src 'self' blob:; manifest-src 'self'; connect-src 'self' https://*.onrender.com https://*.pdfplatform.app https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://ipapi.co https://ipwho.is https://*.iyzipay.com; frame-src 'self' https://*.iyzipay.com; form-action 'self' https://*.iyzipay.com; upgrade-insecure-requests"
      # Asset'ler içerik hash'li — uzun süre cache'lenir
      - path: "/assets/*"
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      # index.html ve SEO HTML'leri asla cache'lenmemeli (yeni deploy hemen yansır)
      - path: "/index.html"
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      # Service worker ve manifest cache'lenmemeli ki PWA güncellemeleri hemen yansısın
      - path: "/sw.js"
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: "/manifest.webmanifest"
        name: Cache-Control
        value: "no-cache, must-revalidate"
      - path: "/sitemap.xml"
        name: Cache-Control
        value: "public, max-age=3600"
    envVars:
      - key: VITE_API_BASE
        sync: false   # PDF API kökü, örn. https://nb-pdf-api.onrender.com
      # ÜRETİMDE GEREKEN auth API kökü — SPA login/ödeme/bakım bunu kullanır.
      # (VITE_SAAS_PROXY_TARGET yalnızca yerel Vite dev proxy'sidir; üretimde işe yaramaz.)
      - key: VITE_SAAS_API_BASE
        sync: false   # Örn. https://api.pdfplatform.app
      - key: VITE_PUBLIC_SITE_URL
        sync: false   # Örn. https://pdfplatform.app (canonical + hreflang için)
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_GA_MEASUREMENT_ID
        sync: false   # Google Analytics 4 ID (G-XXXXXXXXXX)
